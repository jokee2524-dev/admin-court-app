<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปคดีศาลปกครอง</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .case-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid #1a365d; }
        .case-title { font-size: 18px; font-weight: 600; color: #1a365d; margin-bottom: 10px; }
        .case-summary { font-size: 16px; color: #4a5568; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #1a365d;">📚 สรุปคดีประจำวัน</h1>
        <div id="daily-cases">
            <p style="text-align: center;">กำลังโหลดข้อมูลจากฐานข้อมูล...</p>
        </div>
    </div>

    <!-- โหลด Firebase SDK เวอร์ชัน 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // ตั้งค่าการเชื่อมต่อ (คัดลอกมาจากค่าจริงของพี่โจ๊ก)
        const firebaseConfig = {
            apiKey: "AIzaSyCgN41RGMQh3MDMowf1xaptvluza8tLCmw",
            authDomain: "admin-court-app.firebaseapp.com",
            projectId: "admin-court-app",
            storageBucket: "admin-court-app.firebasestorage.app",
            messagingSenderId: "197411042736",
            appId: "1:197411042736:web:3f34dd0853561e96c49275"
        };

        // เริ่มต้น Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // ฟังก์ชันดึงข้อมูลมาแสดงผล
        function loadCases() {
            const container = document.getElementById('daily-cases');
            
            // ดึงข้อมูลจากคอลเลกชัน daily_cases
            db.collection("daily_cases").onSnapshot((querySnapshot) => {
                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="text-align: center;">ยังไม่มีข้อมูลคดีในระบบ (ตรวจสอบชื่อ Collection: daily_cases)</p>';
                    return;
                }

                container.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    // ตรวจสอบว่ามีข้อมูลครบตามที่ระบุ (title และ summary)
                    if (data.title && data.summary) {
// แก้ไขส่วนการวาดการ์ดคดีให้มีปุ่มบันทึก
container.innerHTML += `
    <div class="case-card">
        <div class="case-title">${data.title}</div>
        <div class="case-summary">${data.summary}</div>
        <button onclick="saveToLocal('${doc.id}', '${data.title}')" style="background: #38b2ac; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px;">
            📌 บันทึกไว้อ่าน
        </button>
    </div>
`;

// เพิ่มฟังก์ชันบันทึกลงเครื่อง (LocalStorage)
function saveToLocal(id, title) {
    let saved = JSON.parse(localStorage.getItem('mySavedCases')) || [];
    if (!saved.some(item => item.id === id)) {
        saved.push({id, title});
        localStorage.setItem('mySavedCases', JSON.stringify(saved));
        alert('บันทึกคดี "' + title + '" เรียบร้อยแล้วครับพี่โจ๊ก!');
    } else {
        alert('คดีนี้ถูกบันทึกไว้แล้วครับ');
    }
}
