<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปคดีศาลปกครอง</title>
    
    <!-- 1. โค้ดเชื่อมโยงไฟล์ manifest เพื่อทำ PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a365d">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- นำโค้ด <style> หรือ CSS เดิมมาวางต่อตรงนี้ได้เลยครับ -->
</head>
<body>
    <!-- นำโค้ดโครงสร้าง <body> หรือหน้าตาเว็บเดิมมาวางตรงนี้ได้เลยครับ -->
    
    <script>
        // 2. โค้ดลงทะเบียน Service Worker สำหรับ PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('ระบบ PWA พร้อมใช้งานบนแท็บเล็ตแล้ว!'))
                    .catch(err => console.log('พบปัญหาการลงทะเบียน PWA: ', err));
            });
        }
        
        // 3. ตั้งค่า Firebase (นำรหัสจากหน้า Project Settings ใน Firebase Console มาวาง)
        const firebaseConfig = {
            apiKey: "AIzaSyCgN41RGMQh3MDMowf1xapTvluza8tLCmw",
            authDomain: "admin-court-app.firebaseapp.com",
            projectId: "admin-court-app",
            storageBucket: "admin-court-app.appspot.com",
            messagingSenderId: "197411042736",
            appId: "1:197411042736:web:3f34dd0853561e96c49275"
        };
        
        // เริ่มการเชื่อมต่อระบบฐานข้อมูล
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 4. ดึงข้อมูลจากฐานข้อมูลมาวาดบนหน้าจอ
        function loadCases() {
            db.collection("daily_cases").onSnapshot((querySnapshot) => {
                const container = document.getElementById('daily-cases');
                container.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="case-card clearfix">
                            <div class="case-title">${data.title}</div>
                            <div class="case-summary">${data.summary}</div>
                            <button class="save-btn" onclick="saveCase('${doc.id}')">บันทึกคดี</button>
                        </div>
                    `;
                });
            });
        }

        window.onload = loadCases;
    </script>
</body>
</html>
